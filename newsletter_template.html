<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning Newsletter</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fdfaf5; font-family: 'Georgia', serif;">

    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #fdfaf5; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: transparent;">
                    
                    <tr>
                        <td align="right" style="font-size: 22px; line-height: 1; color: #1a1a1a; letter-spacing: 2px;">
                            20<br>26
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top: 40px; padding-bottom: 20px;">
                            <h1 style="font-size: 52px; font-weight: 400; text-transform: uppercase; letter-spacing: 8px; margin: 0; color: #1a1a1a; line-height: 1.1;">
                                Good Morning<br>Newsltter
                            </h1>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-bottom: 10px;">
                            <p style="font-size: 14px; text-transform: uppercase; letter-spacing: 3px; color: #4a4a4a; margin: 0;">
                                New updates on the major geopolitical shifts
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-bottom: 40px;">
                            <p style="font-size: 16px; font-style: italic; color: #7a7a7a; margin: 0;">
                                Here are the latest News to keep you smart and informed
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td style="background-color: #ffffff; padding: 40px; border: 1px solid #e0e0e0; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                            <div style="font-size: 16px; line-height: 1.8; color: #333333; text-align: left;">
                                
                                {{ newsletter_content }}

                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td align="left" style="padding-top: 20px;">
                            <p style="font-size: 13px; color: #9a9a9a; margin: 0; font-family: Arial, sans-serif;">
                                  with ❤️ from Aman
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
